<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON Data Handling</title>
    <link rel="stylesheet" href="DataSerializationAndParsing.css"> <!-- Optional for styling -->
</head>
<body>
    <header>
        <h1>JSON Data Handling</h1>
    </header>
    <main>
        <section>
            <h2>Add an Item</h2>
            <input type="text" id="itemInput" placeholder="Enter an item..." />
            <button id="addButton">Add Item</button>
        </section>
        <section>
            <h2>Item List</h2>
            <ul id="itemList"></ul>
        </section>
        <section>
            <h2>Load Items</h2>
            <button id="loadButton">Load from LocalStorage</button>
        </section>
    </main>
    <script src="DataSerializationAndParsing.js"></script>
</body>
</html>
