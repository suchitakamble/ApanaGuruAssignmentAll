<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Advanced Search</title>
  <link rel="stylesheet" href="E-commers.js">
  <link rel="stylesheet" href="E-commers.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <div class="container mt-5">
    <h1 class="text-center">E-commerce Advanced Search</h1>
    
    <!-- Search Bar -->
    <div class="input-group mb-3">
      <input type="text" class="form-control" id="searchInput" placeholder="Search products..." onkeyup="showSuggestions(this.value)">
      <div class="input-group-append">
        <button class="btn btn-primary" type="button" onclick="searchProducts()">Search</button>
      </div>
    </div>
    <ul id="suggestions" class="list-group"></ul>
    
    <!-- Filters Panel -->
    <div class="card p-3">
      <h4>Filters</h4>
      <div class="mb-3">
        <label for="categories" class="form-label">Category</label>
        <select id="categories" class="form-select" multiple>
          <option value="electronics">Electronics</option>
          <option value="fashion">Fashion</option>
          <option value="home">Home</option>
          <option value="books">Books</option>
        </select>
      </div>
      <div class="mb-3">
        <label for="priceRange" class="form-label">Price Range</label>
        <input type="range" class="form-range" id="priceRange" min="0" max="1000" step="50" oninput="updatePriceLabel(this.value)">
        <span id="priceLabel">$0 - $1000</span>
      </div>
      <div class="mb-3">
        <label for="rating" class="form-label">Minimum Rating</label>
        <input type="number" class="form-control" id="rating" min="1" max="5" placeholder="e.g., 4">
      </div>
      <div class="form-check">
        <input class="form-check-input" type="checkbox" id="inStock">
        <label class="form-check-label" for="inStock">In Stock Only</label>
      </div>
    </div>
    
    <!-- Results Section -->
    <div id="results" class="mt-5">
      <h4>Search Results</h4>
      <ul id="resultList" class="list-group"></ul>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
