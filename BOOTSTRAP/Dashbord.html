<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive Company Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      font-family: Arial, sans-serif;
    }
    .sidebar {
      min-height: 100vh;
    }
    .main-content {
      padding: 20px;
    }
  </style>
</head>
<body>
  <!-- Header Section -->
  <header class="navbar navbar-expand-lg navbar-dark bg-dark p-3">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">Company Logo</a>
      <form class="d-flex ms-auto" role="search">
        <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search">
        <button class="btn btn-outline-light" type="submit">Search</button>
      </form>
    </div>
  </header>

  <div class="container-fluid">
    <div class="row">
      <!-- Sidebar Navigation -->
      <nav class="col-md-2 bg-light sidebar d-none d-md-block">
        <ul class="nav flex-column pt-4">
          <li class="nav-item"><a class="nav-link active" href="#">Overview</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Analytics</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Sales</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Settings</a></li>
        </ul>
      </nav>

      <!-- Main Dashboard Content -->
      <main class="col-md-10 ms-sm-auto main-content">
        <div class="row">
          <div class="col-md-4">
            <div class="card text-center bg-primary text-white mb-4">
              <div class="card-body">
                <h5 class="card-title">Total Sales</h5>
                <p class="card-text">₹ 1,00,000</p>
              </div>
            </div>
          </div>
          <div class="col-md-4">
            <div class="card text-center bg-success text-white mb-4">
              <div class="card-body">
                <h5 class="card-title">Active Users</h5>
                <p class="card-text">1,250</p>
              </div>
            </div>
          </div>
          <div class="col-md-4">
            <div class="card text-center bg-warning text-white mb-4">
              <div class="card-body">
                <h5 class="card-title">Monthly Revenue</h5>
                <p class="card-text">₹ 50,000</p>
              </div>
            </div>
          </div>
        </div>

        <!-- Charts/Graphs Section -->
        <div class="card mb-4">
          <div class="card-header">Charts/Graphs</div>
          <div class="card-body">
            <p>Placeholder for charts or graphs (e.g., embed chart.js here).</p>
          </div>
        </div>
      </main>
    </div>
  </div>

  <!-- Footer Section -->
  <footer class="bg-dark text-white text-center p-3">
    <p>&copy; 2025 Company Name. All rights reserved.</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
