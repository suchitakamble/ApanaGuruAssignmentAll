<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="BasicAssignment.js">
  <title>JavaScript Basics</title>
  <style>
    #hoverElement {
      padding: 10px;
      margin-top: 20px;
      background-color: lightblue;
    }
  </style>
</head>
<body>
  <h1>JavaScript Fundamentals: Basic Syntax and Event Handling</h1>

  <!-- Input Section -->
  <label for="nameInput">Enter your name:</label>
  <input type="text" id="nameInput" />
  <button id="greetButton">Greet Me</button>

  <!-- Greeting Message -->
  <p id="greetingMessage"></p>

  <!-- Hover Section -->
  <div id="hoverElement">Hover over this box to change its color.</div>

  <!-- Number Evaluation -->
  <label for="numberInput">Enter a number:</label>
  <input type="number" id="numberInput" />
  <button id="checkNumberButton">Check Even/Odd</button>
  <p id="numberResult"></p>

  <!-- JavaScript File -->
  <script src="BasicAssignment.js"></script>
</body>
</html>
