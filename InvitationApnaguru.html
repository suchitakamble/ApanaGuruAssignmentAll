<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invitation Card</title>
  <link rel="stylesheet" href="Invitaion.css">
</head>
<body>
  <div class="invitation-background">
    <div class="invitation-card">
      <div class="invitation-header">
        <img src="https://via.placeholder.com/100" alt="Logo" class="logo">
        <h1>You're Invited!</h1>
      </div>
      <div class="invitation-content">
        <p class="salutation">Dear Guest,</p>
        <p class="event-name">Annual Gala Dinner</p>
        <p class="event-details">
          Date: 25th January 2025<br>
          Time: 7:00 PM<br>
          Location: Grand Ballroom, City Hotel
        </p>
        <p class="description">
          Join us for an evening of celebration, fine dining, and entertainment.
        </p>
        <p class="organizer">
          Hosted by: The Event Team<br>
          Contact: +123 456 7890
        </p>
      </div>
    </div>
  </div>
</body>
</html>
