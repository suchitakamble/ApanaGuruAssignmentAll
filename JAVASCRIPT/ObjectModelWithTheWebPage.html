<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOM Exploration</title>
    <link rel="stylesheet" href="ObjectModelWithTheWebPage.css"> <!-- Optional for styling -->
</head>
<body>
    <header>
        <h1>BOM Exploration</h1>
    </header>
    <section>
        <h2>Window Properties</h2>
        <p id="windowWidth"></p>
        <p id="windowHeight"></p>
        <p id="currentURL"></p>

    <section>
        <h2>Screen Properties</h2>
        <p id="screenWidth"></p>

    <script src="ObjectModelWithTheWebPage.js"></script>
