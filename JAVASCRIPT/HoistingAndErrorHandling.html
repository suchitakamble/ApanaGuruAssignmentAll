<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hoisting and Error Handling</title>
</head>
<body>
    <h1>JavaScript Fundamentals: Hoisting and Error Handling</h1>

    <h2>1. Hoisting</h2>
    <div>
        <h3>Variable and Function Hoisting</h3>
        <button onclick="demonstrateHoisting()">Demonstrate Hoisting</button>
        <p id="hoistingResult"></p>
    </div>

    <h2>2. Error Handling</h2>
    <div>
        <h3>Division with Error Handling</h3>
        <label for="numberInput">Enter a number: </label>
        <input type="number" id="numberInput">
        <button onclick="handleDivision()">Divide</button>
        <p id="errorHandlingResult"></p>
    </div>

    <script src="HoistingAndErrorHandling.js"></script>
</body>
</html>
