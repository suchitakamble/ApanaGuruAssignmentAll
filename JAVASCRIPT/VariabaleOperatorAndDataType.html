<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JavaScript Variables, Operators, and Data Types</title>
</head>
<body>
  <h1>JavaScript Fundamentals</h1>

  <!-- Variables -->
  <h2>Variables</h2>
  <button onclick="demonstrateVariables()">Show Variable Scopes</button>
  <p id="variableOutput"></p>

  <!-- Arithmetic Operators -->
  <h2>Arithmetic Operators</h2>
  <input type="number" id="num1" placeholder="Enter first number">
  <input type="number" id="num2" placeholder="Enter second number">
  <button onclick="calculate()">Calculate</button>
  <p id="arithmeticOutput"></p>

  <!-- Logical Operators -->
  <h2>Logical Operators</h2>
  <input type="checkbox" id="bool1"> Boolean 1
  <input type="checkbox" id="bool2"> Boolean 2
  <button onclick="logicalOperations()">Test Logical Operators</button>
  <p id="logicalOutput"></p>

  <!-- Assignment Operators -->
  <h2>Assignment Operators</h2>
  <button onclick="increment()">Increment Score</button>
  <button onclick="decrement()">Decrement Score</button>
  <p id="assignmentOutput">Score: 0</p>

  <!-- Relational Operators -->
  <h2>Relational Operators</h2>
  <input type="number" id="compare1" placeholder="Number 1">
  <input type="number" id="compare2" placeholder="Number 2">
  <button onclick="compareNumbers()">Compare</button>
  <p id="relationalOutput"></p>

  <!-- Data Types -->
  <h2>Data Types</h2>
  <input id="dataTypeInput" placeholder="Enter any value">
  <button onclick="determineDataType()">Check Data Type</button>
  <p id="dataTypeOutput"></p>

  <script src="VariableOperatorsAndDataType.js"></script>
</body>
</html>
