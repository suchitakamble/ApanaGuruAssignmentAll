<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="ArryaSetAndMaps.css">
    <title>Product Inventory System</title>
    <style>
       
    </style>
</head>
<body>
    <h1>Product Inventory System</h1>
    
    <!-- Form to Add Products -->
    <div>
        <h2>Add Product</h2>
        <div class="form-group">
            <label for="productId">Product ID</label>
            <input type="number" id="productId" placeholder="Enter product ID">
        </div>
        <div class="form-group">
            <label for="productName">Product Name</label>
            <input type="text" id="productName" placeholder="Enter product name">
        </div>
        <div class="form-group">
            <label for="productCategory">Category</label>
            <input type="text" id="productCategory" placeholder="Enter category">
        </div>
        <div class="form-group">
            <label for="productPrice">Price</label>
            <input type="number" id="productPrice" placeholder="Enter price">
        </div>
        <div class="form-group">
            <label for="productQuantity">Quantity</label>
            <input type="number" id="productQuantity" placeholder="Enter quantity">
        </div>
        <button onclick="handleAddProduct()">Add Product</button>
    </div>

    <!-- Table to Display Products -->
    <div>
        <h2>Product Inventory</h2>
        <table id="productTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Category</th>
                    <th>Price</th>
                    <th>Quantity</th>
                </tr>
            </thead>
           
        </table>
    </div>
    <script src="ArryaSetAndMaps.js"></script>
</body>
</html>
